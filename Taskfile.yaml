version: '3'

vars:
  BINARY_NAME: mcpproxy
  TEST_SERVER_NAME: mcpserver
  BUILD_DIR: ./bin
  MAIN_PATH: ./cmd/proxy
  TEST_SERVER_PATH: ./cmd/mcpserver
  COVERAGE_FILE: coverage.out

tasks:
  # default:
  #   desc: Run tests and build (default target)
  #   deps: [test, build]

  default:
    cmds:
      - task -l
    silent: true

  create-tls-certs:
    desc: Create self-signed TLS certificates for local development
    cmds:
      - echo "Creating self-signed TLS certificates... (you need to install mkcert)"
      - mkcert localhost 127.0.0.1 ::1

  build:
    desc: Build the proxy server binary
    cmds:
      - echo "Building {{.BINARY_NAME}}..."
      - go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}} {{.MAIN_PATH}}
      - echo "✓ Build complete{{":"}} {{.BUILD_DIR}}/{{.BINARY_NAME}}"
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}}"

  build-testserver:
    desc: Build the MCP test server binary
    cmds:
      - echo "Building {{.TEST_SERVER_NAME}}..."
      - go build -o {{.BUILD_DIR}}/{{.TEST_SERVER_NAME}} {{.TEST_SERVER_PATH}}
      - echo "✓ Build complete{{":"}} {{.BUILD_DIR}}/{{.TEST_SERVER_NAME}}"
    sources:
      - "cmd/mcpserver/**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/{{.TEST_SERVER_NAME}}"

  run-testserver:
    desc: Build and run the MCP test server
    cmds:
      - echo "Starting MCP test server on port 8081..."
      - go run {{.TEST_SERVER_PATH}}

  start-all:
    desc: Start both MCP test server and proxy
    deps:
      - run
      - run-testserver

  test:
    desc: Run all tests
    cmds:
      - echo "Running tests..."
      - go test ./... -v

  coverage:
    desc: Run tests with coverage report
    cmds:
      - echo "Running tests with coverage..."
      - go test ./... -coverprofile={{.COVERAGE_FILE}}
      - go tool cover -html={{.COVERAGE_FILE}}
      - echo "✓ Coverage report generated{{":"}} {{.COVERAGE_FILE}}"
    generates:
      - "{{.COVERAGE_FILE}}"

  clean:
    desc: Remove build artifacts
    cmds:
      - echo "Cleaning..."
      - rm -rf {{.BUILD_DIR}}
      - rm -f {{.COVERAGE_FILE}}
      - echo "✓ Clean complete"

  run:
    desc: Build and run the proxy server (development mode)
    deps: [build]
    env:
      PROXY_URL: "http://localhost:8080"
      UPSTREAM_MCP_URL: "http://localhost:8081"
      MCP_IDP_CLIENT_SECRET: "{{.CLIENT_SECRET}}"
    cmds:
      - echo "Starting MCP proxy server..."
      - |
        if [ -z "$MCP_IDP_CLIENT_SECRET" ]; then
          echo "Error: MCP_IDP_CLIENT_SECRET environment variable is not set"
          exit 1
        fi
      - go run {{.MAIN_PATH}}

  install:
    desc: Download and verify dependencies
    cmds:
      - echo "Installing dependencies..."
      - go mod download
      - go mod verify
      - echo "✓ Dependencies installed"

  lint:
    desc: Run golangci-lint
    cmds:
      - echo "Running linter..."
      - golangci-lint run ./...
      - echo "✓ Lint complete"

  fmt:
    desc: Format code with gofmt and goimports
    cmds:
      - echo "Formatting code..."
      - go fmt ./...
      - goimports -w .
      - echo "✓ Format complete"

  build-all:
    desc: Build for multiple platforms
    cmds:
      - echo "Building for multiple platforms..."
      - mkdir -p {{.BUILD_DIR}}
      - task: build-linux-amd64
      - task: build-linux-arm64
      - task: build-darwin-amd64
      - task: build-darwin-arm64
      - task: build-windows-amd64
      - echo "✓ Multi-platform build complete"

  build-linux-amd64:
    internal: true
    cmds:
      - GOOS=linux GOARCH=amd64 go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-linux-amd64 {{.MAIN_PATH}}

  build-linux-arm64:
    internal: true
    cmds:
      - GOOS=linux GOARCH=arm64 go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-linux-arm64 {{.MAIN_PATH}}

  build-darwin-amd64:
    internal: true
    cmds:
      - GOOS=darwin GOARCH=amd64 go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-darwin-amd64 {{.MAIN_PATH}}

  build-darwin-arm64:
    internal: true
    cmds:
      - GOOS=darwin GOARCH=arm64 go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-darwin-arm64 {{.MAIN_PATH}}

  build-windows-amd64:
    internal: true
    cmds:
      - GOOS=windows GOARCH=amd64 go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-windows-amd64.exe {{.MAIN_PATH}}

  keycloak-start:
    desc: Start Keycloak container on port 8090 (dev mode)
    vars:
      KC_CONTAINER: mcp-keycloak
      KC_IMAGE: quay.io/keycloak/keycloak:26.0
    cmds:
      - |
        if docker inspect {{.KC_CONTAINER}} >/dev/null 2>&1; then
          echo "Container '{{.KC_CONTAINER}}' already exists — use 'task keycloak-stop' first."
          exit 0
        fi
        docker run -d \
          --name {{.KC_CONTAINER}} \
          --rm \
          -p 8090:8080 \
          -e KC_BOOTSTRAP_ADMIN_USERNAME=admin \
          -e KC_BOOTSTRAP_ADMIN_PASSWORD=admin \
          {{.KC_IMAGE}} \
          start-dev
      - echo "Keycloak starting at http://localhost:8090 (admin/admin)"
      - echo "Run 'task keycloak-setup' once it is ready, or use 'task keycloak' to do both."

  keycloak-setup:
    desc: Configure Keycloak realm, client, scope, and test user for MCP proxy
    cmds:
      - bash scripts/keycloak-setup.sh
    env:
      KC_BASE: "http://localhost:8090"
      KC_REALM: "mcp"
      KC_PROXY_CLIENT: "mcp-proxy-client"
      KC_PROXY_SECRET: "mcp-proxy-secret"
      KC_AUDIENCE: "http://localhost:8081"
      KC_REDIRECT_URI: "http://localhost:8080/callback"
      KC_TEST_USER: "devuser"
      KC_TEST_PASS: "DevPass1!"

  keycloak-stop:
    desc: Stop and remove the Keycloak container
    cmds:
      - docker stop mcp-keycloak 2>/dev/null || true
      - echo "Keycloak stopped."

  keycloak:
    desc: Start Keycloak and configure it for MCP proxy (combines start + setup)
    cmds:
      - task: keycloak-start
      - task: keycloak-setup

  test-integration:
    desc: Run Keycloak E2E integration tests (requires Docker)
    cmds:
      - echo "Running Keycloak integration tests..."
      - go test ./internal/service/auth/... -tags integration -timeout 300s -run TestKeycloak -v
      - echo "✓ Integration tests complete"

  security:
    desc: Run security checks with gosec
    cmds:
      - echo "Running security checks..."
      - gosec ./...
      - echo "✓ Security check complete"

  help:
    desc: Display help message
    cmds:
      - echo "MCP Proxy Server - Task Commands"
      - echo ""
      - echo "Usage{{":"}} task [target]"
      - echo ""
      - echo "Available tasks{{":"}}"
      - task --list