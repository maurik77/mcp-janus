apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-janus.fullname" . }}
  labels:
    {{- include "mcp-janus.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "mcp-janus.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
